<div class="w-full mx-auto">
  <app-page-header
    title="Master Category"
    addButtonLabel="Add Master Category"
    addButtonRoute="/category/add-category"
  />

  <app-table-filter
    [filters]="[]"
    searchPlaceholder="Search Category"
    (filterChange)="applyFilters($event)"
    (reset)="applyFilters({ searchText: '', selectedFilters: {} })"
  />

  <app-table
    [columns]="columns"
    [data]="filteredCategories"
    [menuItems]="menuItems"
    (menuOpen)="setActiveRow($event)"
    (menuAction)="handleMenuAction($event)"
  />
</div>
