<div class="">
  <div class="flex items-center gap-3 mb-6">
    <a
      routerLink="/layouts/category"
      class="back-btn bg-[url('/assets/images/tabler-icon-arrow-narrow-left.png')] bg-no-repeat bg-position-[left_50%_center]"
    >
    </a>
    <h1 class="text-2xl font-bold text-gray-800">Add Category</h1>
  </div>

  <!-- add category -->
  <form (ngSubmit)="saveCategory()">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-xl">
      <div class="space-y-5">
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Category Name</label>
          <input
            type="text"
            placeholder="ex. શહેર સમાચાર"
            [(ngModel)]="categoryForm.name"
            name="categoryName"
            class="w-full border border-gray-300 rounded-lg px-3 py-3 text-sm focus:outline focus:outline-gray-300"
          />
        </div>
        <div class="grid sm:grid-cols-2 gap-3">
          <div>
            <label class="font-semibold text-gray-700 mb-1 block">Status</label>
            <div class="grid sm:grid-cols-2 gap-4">
              <!-- Active -->
              <label
                class="flex items-center gap-2 cursor-pointer border border-gray-300 rounded-lg px-4 py-2 hover:border-primary transition"
              >
                <input
                  type="radio"
                  name="status"
                  value="active"
                  [(ngModel)]="categoryForm.status"
                  class="w-4 h-4 accent-primary"
                />
                <span class="text-sm font-medium text-gray-700"> Active </span>
              </label>

              <!-- Inactive -->
              <label
                class="flex items-center gap-2 cursor-pointer border border-gray-300 rounded-lg px-4 py-2 hover:border-primary transition"
              >
                <input
                  type="radio"
                  name="status"
                  value="inactive"
                  [(ngModel)]="categoryForm.status"
                  class="w-4 h-4 accent-primary"
                />
                <div class="text-sm font-medium text-gray-700">Inactive</div>
              </label>
            </div>
          </div>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button
          type="submit"
          class="bg-primary hover:bg-primary text-white py-3 rounded-lg text-sm font-medium transition px-6"
        >
          Save Category
        </button>
        <button
          routerLink="/layouts/category"
          class="border border-gray-200 text-primary py-3 rounded-lg text-sm font-medium hover:bg-secondary-hover transition-all duration-300 px-4"
        >
          Cancel
        </button>
      </div>
    </div>
  </form>
</div>
