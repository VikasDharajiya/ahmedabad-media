<div>
  <div class="mb-6">
    <app-page-header title="Add Category" backRoute="/category" />
  </div>

  <div class="bg-white shadow-lg rounded-lg p-8 max-w-lg">
    <form (ngSubmit)="saveCategory()">
      <div class="space-y-5">
        <!-- Category Name -->
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Category Name</label>
          <input
            type="text"
            placeholder="ex. શહેર સમાચાર"
            [(ngModel)]="categoryForm.name"
            name="categoryName"
            class="w-full border border-gray-300 rounded-lg px-3 py-3 text-sm focus:outline focus:outline-gray-300"
          />
        </div>

        <!-- sequence -->
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Sequence</label>
          <input
            type="number"
            [(ngModel)]="categoryForm.sequence"
            name="categorySequence"
            class="w-full border border-gray-300 rounded-lg px-3 py-3 text-sm focus:outline focus:outline-gray-300"
          />
        </div>

        <!-- Status -->
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Status</label>
          <div class="grid sm:grid-cols-2 gap-4 max-w-xs">
            <label
              class="flex items-center gap-2 cursor-pointer border border-gray-300 rounded-lg px-4 py-2 hover:border-primary transition"
            >
              <input
                type="radio"
                name="status"
                value="active"
                [(ngModel)]="categoryForm.status"
                class="w-4 h-4 accent-primary"
              />
              <span class="text-sm font-medium text-gray-700">Active</span>
            </label>

            <label
              class="flex items-center gap-2 cursor-pointer border border-gray-300 rounded-lg px-4 py-2 hover:border-primary transition"
            >
              <input
                type="radio"
                name="status"
                value="inactive"
                [(ngModel)]="categoryForm.status"
                class="w-4 h-4 accent-primary"
              />
              <span class="text-sm font-medium text-gray-700">Inactive</span>
            </label>
          </div>
        </div>
      </div>
      <!-- button -->
      <div class="flex gap-3 items-center mt-6">
        <app-button
          styleClass="py-3 px-6 text-sm font-medium"
          label="Save Category"
          variant="primary-btn"
          type="submit"
        ></app-button>
        <app-button
          [routerLink]="'/category'"
          styleClass=""
          label="Cancel"
          variant="secondary-btn"
          type="button"
        ></app-button>
      </div>
    </form>
  </div>
</div>
