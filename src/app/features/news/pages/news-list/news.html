<div class="w-full mx-auto">
  <app-page-header title="News" addButtonLabel="Add News" addButtonRoute="/news/add-news" />

  <app-table-filter
    [filters]="filters"
    searchPlaceholder="Search News"
    (filterChange)="applyFilters($event)"
  />

  <app-table
    [columns]="columns"
    [data]="filteredNews"
    [menuItems]="menuItems"
    mobileView="accordion"
    mobileTitleField="title"
    [mobileActions]="[
      { id: 'view', label: 'View' },
      { id: 'edit', label: 'Edit' },
      { id: 'delete', label: 'Delete' },
      { id: 'comment-view', label: 'Comment View' },
      { id: 'select-other', label: 'Select Other News' },
    ]"
    [mobileHiddenFields]="['title', 'id']"
    (mobileAddClick)="openPreview($event)"
    (menuAction)="handleMenuAction($event)"
  />
</div>

<app-news-preview-dialog
  [(visible)]="showPreviewModal"
  [news]="selectedNews"
  (cancel)="closePreview()"
/>

<app-news-comment-dialog [(visible)]="showCommentDialog" [comments]="comments" />

<app-news-select-dialog
  [(visible)]="showSelectOtherDialog"
  [allNews]="allNews"
  (save)="onSelectNewsSave($event)"
  (cancel)="onSelectNewsCancel()"
/>
