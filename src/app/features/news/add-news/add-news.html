<div class="">
  <!-- Page Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <a
        routerLink="/layouts/news"
        class="size-10 flex items-center justify-center rounded-lg border border-gray-200 bg-white text-gray-500 hover:bg-red-50 hover:text-red-700 transition shadow-sm bg-[url('/assets/images/tabler-icon-arrow-narrow-left.png')] bg-no-repeat bg-position-[left_50%_center]"
      >
      </a>
      <h1 class="text-2xl font-bold text-gray-800">Add News</h1>
    </div>
    <!-- live -->
    <div
      *ngIf="selectedType === 'Live News'"
      class="items-center animate-pulse flex gap-1 bg-red-600 text-white text-sm font-semibold px-3 py-1.5 rounded-full shadow"
    >
      <span class="size-2 rounded-full bg-white inline-block"></span>
      Live
    </div>
  </div>

  <!-- Main Form Card -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-4">
    <!-- Titles -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="font-semibold text-gray-700 mb-1 block"
          >Title <span class="font-medium text-gray-600">(Highlight)</span></label
        >
        <input
          type="text"
          placeholder="Enter title prefix to be highlighted"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline focus:outline-gray-300"
        />
      </div>
      <div>
        <label class="font-semibold text-gray-700 mb-1 block">Title</label>
        <input
          type="text"
          placeholder="Enter remaining part of the title which doesn't need to be highlighted"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline focus:outline-gray-300"
        />
      </div>
    </div>

    <!-- Meta -->
    <div class="grid grid-cols-4 gap-4 mb-4">
      <div class="">
        <label class="font-semibold text-gray-700 mb-1 block">Category</label>
        <select
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-600 bg-white focus:outline focus:outline-gray-300 appearance-none bg-[url('/assets/images/tabler-icon-triangle-inverted.png')] bg-no-repeat bg-position-[right_15px_center] bg-size-[9px]"
        >
          <option>Select</option>
          <option>શહેર સમાચાર</option>
          <option>રાજ્ય સમાચાર</option>
          <option>ક્રાઈમ</option>
        </select>
      </div>
      <div class="">
        <label class="font-semibold text-gray-700 mb-1 block">Type</label>
        <select
          [(ngModel)]="selectedType"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-600 bg-white focus:outline focus:outline-gray-300 appearance-none bg-[url('/assets/images/tabler-icon-triangle-inverted.png')] bg-no-repeat bg-position-[right_15px_center] bg-size-[9px]"
        >
          <option value="Normal">Normal</option>
          <option value="Live News">Live News</option>
          <option value="Sponsored">Sponsored</option>
        </select>
      </div>
      <div class="">
        <label class="font-semibold text-gray-700 mb-1 block">Status</label>
        <select
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-600 bg-white focus:outline focus:outline-gray-300 appearance-none bg-[url('/assets/images/tabler-icon-triangle-inverted.png')] bg-no-repeat bg-position-[right_15px_center] bg-size-[9px]"
        >
          <option>Draft</option>
          <option>Published</option>
          <option>Scheduled</option>
        </select>
      </div>
      <div>
        <label class="font-semibold text-gray-700 mb-1 block">Author</label>
        <input
          type="text"
          placeholder="Enter author name"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline focus:outline-gray-300"
        />
      </div>
    </div>
    <!-- Date / Time -->
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div>
        <label class="font-semibold text-gray-700 mb-1 block">Published Date</label>
        <input
          type="date"
          placeholder="Select Date"
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-600 bg-white focus:outline focus:outline-gray-300"
        />
      </div>
      <div>
        <label class="font-semibold text-gray-700 mb-1 block">Published Time</label>
        <input
          type="time"
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-600 bg-white focus:outline focus:outline-gray-300"
        />
      </div>
    </div>

    <hr class="border-gray-100 mb-5" />

    <!-- Rich Text Editor -->
    <div>
      <label class="font-semibold text-gray-700 mb-4 block">News Details</label>
      <!-- Toolbar -->
      <div
        class="border border-gray-300 rounded-t-lg px-2 py-1.5 bg-gray-50 flex items-center gap-0.5 flex-wrap"
      >
        <button
          onclick="fmt('bold')"
          title="Bold"
          class="p-1.5 rounded hover:bg-gray-200 transition font-bold text-gray-700 text-sm w-7 h-7 flex items-center justify-center"
        >
          B
        </button>
        <button
          onclick="fmt('italic')"
          title="Italic"
          class="p-1.5 rounded hover:bg-gray-200 transition italic text-gray-700 text-sm w-7 h-7 flex items-center justify-center"
        >
          I
        </button>
        <button
          onclick="insertLink()"
          title="Link"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
          </svg>
        </button>
        <button
          onclick="fmt('formatBlock', 'blockquote')"
          title="Quote"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 text-sm w-7 h-7 flex items-center justify-center"
        >
          ❝
        </button>
        <button
          onclick="fmt('formatBlock', 'pre')"
          title="Code"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 font-mono text-xs w-7 h-7 flex items-center justify-center"
        >
          &lt;/&gt;
        </button>
        <button
          onclick="insertImage()"
          title="Image"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
        </button>
        <div class="w-px h-5 bg-gray-200 mx-1"></div>
        <button
          onclick="fmt('insertUnorderedList')"
          title="Bullet list"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <line x1="9" y1="6" x2="20" y2="6" />
            <line x1="9" y1="12" x2="20" y2="12" />
            <line x1="9" y1="18" x2="20" y2="18" />
            <circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none" />
            <circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none" />
            <circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none" />
          </svg>
        </button>
        <button
          onclick="fmt('insertOrderedList')"
          title="Numbered list"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <line x1="10" y1="6" x2="21" y2="6" />
            <line x1="10" y1="12" x2="21" y2="12" />
            <line x1="10" y1="18" x2="21" y2="18" />
            <path d="M4 6h1v4" />
            <path d="M4 10H6" />
            <path d="M6 18H4l2-2.5a1 1 0 00-1.8-.6" />
          </svg>
        </button>
      </div>
      <div
        contenteditable="true"
        class="border border-gray-300 border-t-0 rounded-b-lg min-h-96 px-4 py-3 text-sm text-gray-600 h-full focus:outline focus:outline-gray-300 mb-5"
        data-placeholder="Enter news details here..."
      ></div>
    </div>

    <div class="border border-gray-200 mb-5"></div>
    <!-- liveFeed -->
    <div class="border-b border-gray-200 mb-5" *ngIf="selectedType === 'Live News'">
      <div class="flex items-center justify-between mb-6">
        <!-- Left -->
        <h1 class="text-lg font-semibold text-gray-600">Live News Feed</h1>

        <!-- Right -->
        <button
          (click)="visible = true"
          class="items-center gap-2 bg-red-700 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow hover:bg-red-800 transition-all duration-300 ease-in-out"
        >
          Add Feed
        </button>
      </div>
      <div class="overflow-x-auto">
        <p-table [value]="newsList" tableStyleClass="w-full text-sm">
          <!-- HEADER -->
          <ng-template pTemplate="header">
            <tr class="bg-gray-50 border-b border-gray-100">
              <th class="w-10 py-6 px-3"></th>

              <th class="py-3 px-3 text-left font-semibold text-gray-600">ID</th>

              <th class="py-3 px-3 text-left font-semibold text-gray-600">Title</th>

              <th class="py-3 px-3 text-left font-semibold text-gray-600 whitespace-nowrap">
                Published Date & Time
              </th>
            </tr>
          </ng-template>

          <!-- BODY -->
          <ng-template pTemplate="body" let-news>
            <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
              <!-- Action Column -->
              <td class="py-3 px-3">
                <p-menu
                  #menu
                  [model]="getMenuItems(news)"
                  [popup]="true"
                  styleClass="bg-white rounded-xl shadow-md border border-gray-100 py-2  z-50"
                >
                  <ng-template pTemplate="item" let-item>
                    <button
                      type="button"
                      class="w-full text-left flex items-center gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-all duration-150 cursor-pointer rounded-lg"
                    >
                      <i [class]="item.icon + ' text-gray-500 text-sm'"></i>
                      <span class="font-medium">{{ item.label }}</span>
                    </button>
                  </ng-template>
                </p-menu>
                <p-button
                  (click)="menu.toggle($event)"
                  class="p-2 rounded-md hover:bg-gray-100"
                  icon="pi pi-ellipsis-v"
                >
                </p-button>
              </td>

              <!-- ID -->
              <td class="py-3 px-3 text-gray-600">
                {{ news.id }}
              </td>

              <!-- Title -->
              <td class="py-3 px-3 font-medium text-gray-700">
                {{ news.title }}
              </td>

              <!-- Date -->
              <td class="py-3 px-3 text-gray-600">
                {{ news.publishedAt }}
              </td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </div>

    <!-- save cancle btn -->
    <div class="flex items-center gap-3 pb-10">
      <button
        class="bg-red-700 hover:bg-red-800 text-white px-7 py-2.5 rounded-lg text-sm font-semibold shadow transition"
      >
        Save News
      </button>
      <button
        routerLink="/layouts/news"
        class="border border-gray-300 text-gray-600 px-7 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition bg-white"
      >
        Cancel
      </button>
    </div>
  </div>
</div>

<!-- Dialog -->
<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [showHeader]="false"
  styleClass="w-full max-w-2xl"
  [pt]="{
    mask: { class: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50' },
    root: { class: 'bg-white w-full rounded-xl shadow-xl' },
  }"
>
  <div class="flex items-center justify-between px-6 py-4">
    <h2 class="text-lg font-semibold text-gray-700">Add Feed</h2>
    <button
      (click)="visible = false"
      class="size-8 border border-gray-200 hover:bg-gray-50 bg-[url('/assets/images/close-btn.png')] bg-no-repeat bg-center rounded-lg"
    ></button>
  </div>

  <hr class="border border-gray-200 w-[95%] mb-2 mx-auto" />

  <div class="p-6 space-y-5">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Published Date</label>
        <input
          type="date"
          class="w-full border border-gray-300 text-gray-700 rounded-lg px-3 py-2 focus:outline focus:outline-gray-300"
        />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Published Time</label>
        <input
          type="time"
          class="w-full border border-gray-300 text-gray-700 rounded-lg px-3 py-2 focus:outline focus:outline-gray-300"
        />
      </div>
    </div>

    <div>
      <label class="font-semibold text-gray-700 mb-4 block">Feed Details</label>
      <div
        class="border border-gray-300 rounded-t-lg px-2 py-1.5 bg-gray-50 flex items-center gap-0.5 flex-wrap"
      >
        <button
          (click)="fmt('bold')"
          class="p-1.5 rounded hover:bg-gray-200 font-bold text-gray-700 text-sm w-7 h-7 flex items-center justify-center"
        >
          B
        </button>
        <button
          (click)="fmt('italic')"
          class="p-1.5 rounded hover:bg-gray-200 italic text-gray-700 text-sm w-7 h-7 flex items-center justify-center"
        >
          I
        </button>
        <button
          (click)="fmt('insertLink')"
          title="Link"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
          </svg>
        </button>

        <button
          (click)="fmt('formatBlock', 'blockquote')"
          title="Quote"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 text-sm w-7 h-7 flex items-center justify-center"
        >
          ❝
        </button>

        <button
          (click)="fmt('formatBlock', 'pre')"
          title="Code"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 font-mono text-xs w-7 h-7 flex items-center justify-center"
        >
          &lt;/&gt;
        </button>

        <button
          title="Image"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
        </button>

        <div class="w-px h-5 bg-gray-200 mx-1"></div>

        <button
          (click)="fmt('insertUnorderedList')"
          title="Bullet list"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <line x1="9" y1="6" x2="20" y2="6" />
            <line x1="9" y1="12" x2="20" y2="12" />
            <line x1="9" y1="18" x2="20" y2="18" />
            <circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none" />
            <circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none" />
            <circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none" />
          </svg>
        </button>

        <button
          (click)="fmt('insertOrderedList')"
          title="Numbered list"
          class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <line x1="10" y1="6" x2="21" y2="6" />
            <line x1="10" y1="12" x2="21" y2="12" />
            <line x1="10" y1="18" x2="21" y2="18" />
            <path d="M4 6h1v4" />
            <path d="M4 10H6" />
            <path d="M6 18H4l2-2.5a1 1 0 00-1.8-.6" />
          </svg>
        </button>
      </div>
      <div
        contenteditable="true"
        class="border border-gray-300 border-t-0 rounded-b-lg min-h-52 px-4 py-3 text-sm text-gray-600 focus:outline focus:outline-gray-300"
      ></div>
    </div>

    <div class="py-3 flex gap-2">
      <button class="px-4 py-2 rounded-lg bg-red-700 text-white hover:bg-red-800 transition">
        Save Feed
      </button>
      <button
        (click)="visible = false"
        class="px-4 py-2 rounded-lg border border-gray-300 text-red-700 hover:bg-gray-50 transition"
      >
        Cancel
      </button>
    </div>
  </div>
</p-dialog>
