<div>
  <!-- Page Header -->
  <div class="flex items-center justify-between mb-6">
    <app-page-header title="Add News" backRoute="/layouts/news" />

    @if (newsForm.type === 'Live News') {
      <div
        class="items-center animate-pulse flex gap-1 bg-red-600 text-white text-sm font-semibold px-3 py-1.5 rounded-full shadow"
      >
        <span class="size-2 rounded-full bg-white inline-block"></span>
        Live
      </div>
    }
  </div>

  <form (ngSubmit)="saveNews()">
    <app-form-card saveLabel="Save News" cancelRoute="/layouts/news" maxWidthClass="max-w-full">
      <!-- Titles -->
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">
            Title <span class="font-medium text-gray-600">(Highlight)</span>
          </label>
          <input
            type="text"
            placeholder="Enter title prefix to be highlighted"
            [(ngModel)]="newsForm.titleHighlight"
            name="titleHighlight"
            class="form-select text-gray-600"
          />
        </div>
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Title</label>
          <input
            type="text"
            placeholder="Enter remaining part of the title"
            [(ngModel)]="newsForm.title"
            name="title"
            class="form-select text-gray-600"
          />
        </div>
      </div>

      <!-- Meta -->
      <div class="grid sm:grid-cols-2 md:grid-cols-4 gap-4 mb-4">
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Category</label>
          <select
            [(ngModel)]="newsForm.category"
            name="category"
            class="form-select text-gray-600 appearance-none bg-[url('/assets/images/tabler-icon-triangle-inverted.png')] bg-no-repeat bg-position-[right_15px_center] bg-size-[9px]"
          >
            <option value="">Select</option>
            <option>શહેર સમાચાર</option>
            <option>રાજ્ય સમાચાર</option>
            <option>ક્રાઈમ</option>
          </select>
        </div>
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Type</label>
          <select
            [(ngModel)]="newsForm.type"
            name="type"
            class="form-select text-gray-600 appearance-none bg-[url('/assets/images/tabler-icon-triangle-inverted.png')] bg-no-repeat bg-position-[right_15px_center] bg-size-[9px]"
          >
            <option value="Normal">Normal</option>
            <option value="Live News">Live News</option>
            <option value="Sponsored">Sponsored</option>
          </select>
        </div>
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Status</label>
          <select
            [(ngModel)]="newsForm.status"
            name="status"
            class="form-select text-gray-600 appearance-none bg-[url('/assets/images/tabler-icon-triangle-inverted.png')] bg-no-repeat bg-position-[right_15px_center] bg-size-[9px]"
          >
            <option>Draft</option>
            <option>Published</option>
            <option>Scheduled</option>
          </select>
        </div>
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Author</label>
          <input
            type="text"
            placeholder="Enter author name"
            [(ngModel)]="newsForm.author"
            name="author"
            class="form-select"
          />
        </div>
      </div>

      <!-- Date / Time -->
      <div class="grid sm:grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Published Date</label>
          <input
            type="date"
            [(ngModel)]="newsForm.publishedDate"
            name="publishedDate"
            class="form-select text-gray-600"
          />
        </div>
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Published Time</label>
          <input
            type="time"
            [(ngModel)]="newsForm.publishedTime"
            name="publishedTime"
            class="form-select text-gray-600"
          />
        </div>
      </div>

      <hr class="border-gray-100 mb-5" />

      <!-- Rich Text Editor -->
      <app-text-editor
        #newsDetailsEditor
        label="News Details"
        placeholder="Enter news details here..."
        minHeightClass="min-h-96"
        (contentChange)="newsForm.details = $event"
      />

      <div class="border border-gray-200 my-5"></div>

      <!-- Live News Feed Table -->
      @if (newsForm.type === 'Live News') {
        <div class="mb-5">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-600">Live News Feed</h2>
            <button
              type="button"
              (click)="openFeedDialog()"
              class="bg-primary text-white text-sm font-semibold px-4 py-2 rounded-lg shadow hover:bg-primary-hover transition-all duration-300 ease-in-out"
            >
              Add Feed
            </button>
          </div>

          <div class="overflow-hidden rounded-xl">
            <div class="overflow-hidden rounded-xl">
              <app-table
                [columns]="feedColumns"
                [data]="liveFeeds"
                [menuItems]="feedMenuItems"
                (menuAction)="handleFeedMenuAction($event)"
                [showPaginator]="false"
              />
            </div>
          </div>
        </div>

        <div class="border border-gray-200 mb-5"></div>
      }
    </app-form-card>
  </form>
</div>

<!-- Add Feed Dialog -->
<p-dialog
  [(visible)]="feedDialogVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [showHeader]="false"
  styleClass="max-w-md sm:max-w-lg md:max-w-xl lg:max-w-2xl"
  [pt]="{
    mask: { class: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50' },
    root: { class: 'bg-white w-full rounded-xl shadow-xl' },
  }"
>
  <div class="flex items-center justify-between px-6 py-4">
    <h2 class="text-lg font-semibold text-gray-700">Add Feed</h2>
    <button
      type="button"
      (click)="closeFeedDialog()"
      class="size-8 border border-gray-200 hover:bg-secondary-hover bg-[url('/assets/images/close-btn.png')] bg-no-repeat bg-center rounded-lg"
    ></button>
  </div>

  <hr class="border border-gray-200 w-[95%] mb-2 mx-auto" />

  <div class="p-6 space-y-5">
    <div class="grid sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Published Date</label>
        <input
          type="date"
          [(ngModel)]="feedForm.date"
          name="feedDate"
          class="w-full border border-gray-300 text-gray-700 rounded-lg px-3 py-2 focus:outline focus:outline-gray-300"
        />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Published Time</label>
        <input
          type="time"
          [(ngModel)]="feedForm.time"
          name="feedTime"
          class="w-full border border-gray-300 text-gray-700 rounded-lg px-3 py-2 focus:outline focus:outline-gray-300"
        />
      </div>
    </div>

    <app-text-editor
      #feedDetailsEditor
      label="Feed Details"
      placeholder="Enter feed details here..."
      minHeightClass="min-h-52"
      (contentChange)="feedForm.details = $event"
    />

    <div class="py-3 flex gap-2">
      <button
        type="button"
        (click)="saveFeed()"
        class="px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-hover transition"
      >
        Save Feed
      </button>
      <button
        type="button"
        (click)="closeFeedDialog()"
        class="px-4 py-2 rounded-lg border border-gray-300 text-primary hover:bg-secondary-hover transition"
      >
        Cancel
      </button>
    </div>
  </div>
</p-dialog>
