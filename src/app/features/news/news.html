<div class="w-full mx-auto">
  <app-page-header title="News" addButtonLabel="Add News" addButtonRoute="/layouts/news/add-news" />

  <app-table-filter
    [filters]="filters"
    [showDateRange]="true"
    searchPlaceholder="Search News"
    (filterChange)="applyFilters($event)"
  />

  <app-table
    [columns]="columns"
    [data]="filteredNews"
    [menuItems]="menuItems"
    (menuOpen)="setActiveRow($event)"
    (menuAction)="handleMenuAction($event)"
  />
</div>

<!-- comment dialog  -->

@if (showCommentDialog) {
  <div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white w-[600px] rounded-xl shadow-lg p-6 relative">
      <!-- Header -->
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold">Comments</h2>

        <button
          (click)="showCommentDialog = false"
          class="hover:text-black border border-gray-100 rounded-lg px-2 py-1 text-gray-500 hover:bg-red-50 cursor-pointer transition-colors"
        >
          ✕
        </button>
      </div>

      <!-- Table -->
      <div class="overflow-auto max-h-[400px] border rounded-lg">
        <table class="w-full text-sm">
          <thead class="bg-gray-100 text-left">
            <tr>
              <th class="p-3 w-16">No</th>
              <th class="p-3">Comment</th>
              <th class="p-3 w-40">Username</th>
            </tr>
          </thead>

          <tbody>
            @for (c of comments; track c.no) {
              <tr class="border-t hover:bg-gray-50">
                <td class="p-3">{{ c.no }}</td>
                <td class="p-3">{{ c.comment }}</td>
                <td class="p-3">{{ c.username }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
}

<!-- select other news dialog  -->
@if (showSelectOtherDialog) {
  <div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white w-[500px] rounded-xl shadow-lg p-6 relative">
      <!-- Header -->
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold">Select Other News</h2>

        <button
          (click)="showSelectOtherDialog = false"
          class="border border-gray-100 rounded-lg px-2 py-1 text-gray-500 hover:bg-red-50 cursor-pointer transition-colors hover:text-black"
        >
          ✕
        </button>
      </div>

      <!-- Dropdown -->
      <p class="text-sm text-gray-500 mb-2">Selected: {{ selectedNews.length }}</p>
      <div class="border rounded-lg max-h-60 overflow-auto">
        @for (news of allNews; track news.id) {
          <label class="flex items-center gap-3 p-2 hover:bg-gray-50 cursor-pointer">
            <input
              type="checkbox"
              [value]="news"
              (change)="
                $event.target.checked
                  ? selectedNews.push(news)
                  : selectedNews.splice(selectedNews.indexOf(news), 1)
              "
            />

            <img [src]="news.thumbnail" class="w-8 h-8 rounded object-cover" />

            <span class="truncate">{{ news.title }}</span>
          </label>
        }
      </div>

      <!-- Add Button -->
      <div class="flex items-center mt-4">
        <button (click)="addSelectedNews()" class="primary-btn px-6 py-2.5">Add</button>
      </div>
    </div>
  </div>
}
