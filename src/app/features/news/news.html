<div class="w-full mx-auto">
  <app-page-header title="News" addButtonLabel="Add News" addButtonRoute="/layouts/news/add-news" />

  <app-table-filter
    [filters]="filters"
    [showDateRange]="true"
    searchPlaceholder="Search News"
    (filterChange)="applyFilters($event)"
  />

  <app-table
    [columns]="columns"
    [data]="filteredNews"
    [menuItems]="menuItems"
    (menuOpen)="setActiveRow($event)"
    (menuAction)="handleMenuAction($event)"
  />
</div>
