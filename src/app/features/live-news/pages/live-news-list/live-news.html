<div class="w-full mx-auto">
  <app-page-header
    title="Live News"
    addButtonLabel="Add Live News"
    addButtonRoute="/livenews/add-live-news"
  />

  <app-table-filter
    [filters]="filters"
    searchPlaceholder="Search Live News"
    (filterChange)="applyFilters($event)"
  />

  <app-table
    [columns]="columns"
    [data]="filteredNews"
    [menuItems]="menuItems"
    [showAddButton]="true"
    addButtonIcon="pi pi-plus-circle"
    (addClick)="openAddNewsDialog()"
    mobileView="accordion"
    mobileTitleField="title"
    [showMobileAddButton]="true"
    (mobileAddClick)="openAddNewsDialog()"
    [mobileActions]="[
      { id: 'view', label: 'View' },
      { id: 'edit', label: 'Edit' },
      { id: 'delete', label: 'Delete' },
      { id: 'comment-view', label: 'Comment View' },
    ]"
    [mobileHiddenFields]="['title', 'id']"
    (menuOpen)="setActiveRow($event)"
    (menuAction)="handleMenuAction($event)"
  />
</div>

<app-news-preview-dialog
  [(visible)]="showPreviewModal"
  [news]="selectedNews"
  (cancel)="closePreview()"
/>

<app-news-comment-dialog [(visible)]="showCommentDialog" [comments]="comments" />

<!-- ADD DIALOG -->
<app-live-feed-dialog
  [(visible)]="addNewsDialog"
  title="Add Live News"
  saveLabel="Add News"
  (save)="onFeedSave($event)"
/>
