<div class="flex min-h-screen bg-gray-100">
  <!-- LEFT SIDE (IMAGE) -->
  <div class="hidden lg:flex w-2/3 relative">
    <img
      src="/assets/images/login-img.png"
      class="absolute inset-0 w-full h-full object-top object-cover"
      alt="Login Image"
    />
  </div>

  <!-- RIGHT SIDE (LOGIN) -->
  <div class="w-full lg:w-1/3 flex items-center justify-center bg-white px-6 sm:px-12">
    <div class="w-full max-w-sm">
      <!-- Logo -->
      <img class="max-w-20 mx-auto mb-2 object-contain" src="/assets/images/logo.png" alt="logo" />

      <!-- Heading -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-600 mb-14">
          અમદાવાદનો <br />
          <span class="text-red-700">અવાજ</span>
        </h1>

        <p class="text-gray-700 text-lg font-semibold">Welcome back</p>
        <p class="text-gray-500">Access your dashboard to manage news, users, and content.</p>
      </div>

      <!-- FORM -->
      <form class="space-y-5" (ngSubmit)="login()" [formGroup]="loginForm">
        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-2"> Email Address </label>

          <input
            pInputText
            type="email"
            formControlName="email"
            name="email"
            placeholder="Enter your email"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-1 focus:ring-gray-300"
          />
          <!-- Email Errors -->
          <p
            *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
            class="text-red-600 text-sm p-1"
          >
            <span *ngIf="loginForm.get('email')?.errors?.['required']"> Email is required </span>

            <span *ngIf="loginForm.get('email')?.errors?.['email']"> Enter valid email </span>
          </p>
        </div>

        <!-- Password -->
        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="text-sm font-medium text-gray-600"> Password </label>

            <a class="text-sm text-red-700 hover:underline cursor-pointer"> Forgot? </a>
          </div>

          <p-password
            formControlName="password"
            name="password"
            [feedback]="false"
            [toggleMask]="true"
            placeholder="Enter your password"
            styleClass="w-full flex items-center rounded-xl border border-gray-300 px-4 focus-within:ring-1 focus-within:ring-gray-300"
            inputStyleClass="flex-1 py-3 outline-none border-0 shadow-none bg-transparent focus:ring-0 focus:outline-none"
          >
          </p-password>

          <!-- Password Errors -->
          <p
            *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            class="text-red-600 text-sm mt-1"
          >
            <span *ngIf="loginForm.get('password')?.errors?.['required']">
              Password is required
            </span>

            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">
              Minimum 6 characters required
            </span>
          </p>
        </div>

        <!-- Button -->
        <p-button
          label="Sign In"
          styleClass="w-full py-3 rounded-xl shadow-md font-semibold text-white bg-red-700 border-none hover:bg-red-800"
          (onClick)="login()"
        >
        </p-button>
      </form>

      <!-- Footer -->
      <p class="text-center text-sm text-gray-400 mt-10">
        &copy; 2026 Ahmedabad Media. All rights reserved.
      </p>
    </div>
  </div>
</div>
