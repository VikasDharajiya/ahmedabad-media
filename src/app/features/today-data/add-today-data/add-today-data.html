<div>
  <!-- Page Header -->
  <div class="flex items-center justify-between mb-6">
    <app-page-header title="Add Today's Data" backRoute="/layouts/today-data"></app-page-header>
  </div>

  <div class="bg-white shadow-lg rounded-lg p-8">
    <form [formGroup]="todayForm" (ngSubmit)="saveTodayData()">
      <!-- Date -->
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Date</label>

          <input
            #date
            type="date"
            name="date"
            formGroupName="date"
            class="form-select text-gray-600 px-6 cursor-pointer"
            (click)="date.showPicker()"
          />
        </div>

        <!-- Zodiac -->
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Zodiac Sign</label>

          <input
            type="text"
            name="zodiacSign"
            formGroupName="zodiacSign"
            placeholder="Enter zodiac sign"
            class="form-select text-gray-600"
          />
        </div>
      </div>

      <!-- Sunrise Sunset -->
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Sunrise</label>

          <input
            type="time"
            name="sunrise"
            formGroupName="sunrise"
            class="form-select text-gray-600"
          />
        </div>

        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Sunset</label>

          <input
            type="time"
            name="sunset"
            formGroupName="sunset"
            class="form-select text-gray-600"
          />
        </div>
      </div>

      <!-- season -->
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Season</label>

          <select
            formGroupName="season"
            name="season"
            class="form-select text-gray-600 appearance-none bg-[url('/assets/images/tabler-icon-triangle-inverted.png')] bg-no-repeat bg-position-[right_15px_center] bg-size-[9px]"
          >
            <option value="">Select Season</option>

            @for (season of seasons; track season) {
              <option [value]="season">
                {{ season }}
              </option>
            }
          </select>
        </div>

        <!-- Bank Toggle -->
        <div class="">
          <label class="font-semibold text-gray-700 mb-1 block"
            >Is Bank
            <span class="font-semibold text-gray-700">
              {{ todayForm.get('bank')?.value ? 'Open' : 'Closed' }}
            </span>
          </label>

          <label class="relative inline-flex items-center cursor-pointer mt-2">
            <input type="checkbox" class="sr-only peer" formGroupName="bank" name="bank" />

            <div
              class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-green-600 after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"
            ></div>
          </label>
        </div>
      </div>

      <!-- Fuel Prices -->
      <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Petrol (₹)</label>

          <input
            type="number"
            name="petrol"
            formGroupName="petrol"
            class="form-select text-gray-600"
          />
        </div>

        <div>
          <label class="font-semibold text-gray-700 mb-1 block">Diesel (₹)</label>

          <input
            type="number"
            name="diesel"
            formGroupName="diesel"
            class="form-select text-gray-600"
          />
        </div>

        <div>
          <label class="font-semibold text-gray-700 mb-1 block">CNG (₹)</label>

          <input type="number" name="cng" formGroupName="cng" class="form-select text-gray-600" />
        </div>

        <div>
          <label class="font-semibold text-gray-700 mb-1 block">LPG (₹)</label>

          <input type="number" name="lpg" formGroupName="lpg" class="form-select text-gray-600" />
        </div>
      </div>

      <div class="border border-gray-200 mb-5"></div>

      <!-- Buttons -->
      <div class="flex items-center gap-3">
        <app-button
          label="Save Data"
          variant="primary-btn"
          type="submit"
          styleClass="py-3 px-6 text-sm font-medium"
        ></app-button>

        <app-button
          label="Cancel"
          variant="secondary-btn"
          type="button"
          routerLink="/layouts/today-data"
        ></app-button>
      </div>
    </form>
  </div>
</div>
