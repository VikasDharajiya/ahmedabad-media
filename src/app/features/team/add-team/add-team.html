<!-- Card -->
<div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
  <!-- Card Header -->
  <div class="flex items-center justify-between px-8 py-5 border-b border-gray-200">
    <h1 class="text-xl font-bold text-gray-800 tracking-tight">Team Add</h1>
    <a
      routerLink="/layouts/team"
      class="flex items-center gap-1.5 text-sm font-medium text-gray-500 hover:text-gray-800 transition-colors"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-4 h-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back
    </a>
  </div>

  <!-- Form Body -->
  <form (ngSubmit)="onSubmit()" #teamForm="ngForm" class="px-8 py-7 space-y-6">
    <!-- Row 1: User Name + Email -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">
          User Name <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          name="userName"
          [(ngModel)]="form.userName"
          required
          placeholder=""
          class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">
          Email <span class="text-red-500">*</span>
        </label>
        <input
          type="email"
          name="email"
          [(ngModel)]="form.email"
          required
          placeholder=""
          class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition"
        />
      </div>
    </div>

    <!-- Row 2: Contact Number + BirthDate -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">
          Contact Number <span class="text-red-500">*</span>
        </label>
        <input
          type="tel"
          name="contactNumber"
          [(ngModel)]="form.contactNumber"
          required
          placeholder=""
          class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">BirthDate</label>
        <input
          type="date"
          name="birthDate"
          [(ngModel)]="form.birthDate"
          class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition cursor-pointer"
        />
      </div>
    </div>

    <!-- Row 3: Role + Password -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">
          Role <span class="text-red-500">*</span>
        </label>
        <div class="relative">
          <select
            name="role"
            [(ngModel)]="form.role"
            required
            class="w-full appearance-none rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition cursor-pointer pr-10"
          >
            <option value="Admin">Admin</option>
            <option value="Editor">Editor</option>
            <option value="Viewer">Viewer</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center">
            <svg
              class="w-4 h-4 text-gray-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">
          Password <span class="text-red-500">*</span>
        </label>
        <input
          type="password"
          name="password"
          [(ngModel)]="form.password"
          required
          placeholder=""
          class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition"
        />
      </div>
    </div>

    <!-- Address (full width) -->
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-semibold text-gray-700">Address</label>
      <textarea
        name="address"
        [(ngModel)]="form.address"
        rows="2"
        class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition resize-y"
      ></textarea>
    </div>

    <!-- Row 4: Country + State -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">Country</label>
        <div class="relative">
          <select
            name="country"
            [(ngModel)]="form.country"
            class="w-full appearance-none rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition cursor-pointer pr-10"
          >
            <option value="India">India</option>
            <option value="USA">USA</option>
            <option value="UK">UK</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center">
            <svg
              class="w-4 h-4 text-gray-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">State</label>
        <div class="relative">
          <select
            name="state"
            [(ngModel)]="form.state"
            class="w-full appearance-none rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition cursor-pointer pr-10"
          >
            <option value="Gujarat">Gujarat</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Rajasthan">Rajasthan</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center">
            <svg
              class="w-4 h-4 text-gray-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Row 5: City + Zip Code -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">City</label>
        <div class="relative">
          <select
            name="city"
            [(ngModel)]="form.city"
            class="w-full appearance-none rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition cursor-pointer pr-10"
          >
            <option value="Ahmedabad">Ahmedabad</option>
            <option value="Surat">Surat</option>
            <option value="Vadodara">Vadodara</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center">
            <svg
              class="w-4 h-4 text-gray-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-gray-700">Zip Code</label>
        <input
          type="text"
          name="zipCode"
          [(ngModel)]="form.zipCode"
          placeholder=""
          class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition"
        />
      </div>
    </div>

    <!-- Description (full width) -->
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-semibold text-gray-700">Description</label>
      <textarea
        name="description"
        [(ngModel)]="form.description"
        rows="3"
        class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent transition resize-y"
      ></textarea>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-center gap-3 pt-2">
      <button
        type="submit"
        class="px-7 py-2.5 bg-slate-700 hover:bg-slate-800 text-white text-sm font-semibold rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2"
      >
        Submit
      </button>
      <button
        type="button"
        routerLink="/team"
        class="px-7 py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-semibold rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2"
      >
        Cancel
      </button>
    </div>
  </form>
</div>
