<app-dialog
  [(visible)]="visible"
  size="xl"
  title="Add Today's News"
  saveLabel="Submit"
  cancelLabel="Cancel"
  (save)="onSave()"
  (cancel)="onCancel()"
>
  <div class="py-3 px-6 grid md:grid-cols-2 gap-2">
    <!-- News picker -->
    <div>
      <label class="font-semibold text-gray-700 mb-1 block text-sm">News</label>

      <div
        (click)="toggleDropdown()"
        class="border border-gray-300 w-full rounded-lg py-2 px-2 h-10 flex items-center gap-2 cursor-pointer"
      >
        @if (form.news) {
          <img [src]="form.news.thumbnail" class="w-5 h-5 rounded object-cover" />
          <span>{{ form.news.title }}</span>
        } @else {
          <span class="text-gray-500 text-sm">Select News</span>
        }
      </div>

      @if (dropdownOpen) {
        <div class="border border-gray-300 rounded-lg mt-1 max-h-60 overflow-auto bg-white shadow">
          <input
            type="text"
            [(ngModel)]="searchText"
            (input)="filterNews()"
            placeholder="Search news..."
            class="w-full p-2 border-b border-gray-300 outline-none text-sm"
          />
          @for (item of filteredNewsList; track item.id) {
            <div
              (click)="selectNews(item)"
              class="flex items-center gap-3 p-2 hover:bg-gray-50 cursor-pointer"
            >
              <img [src]="item.thumbnail" class="w-8 h-8 rounded object-cover" />
              <span>{{ item.title }}</span>
            </div>
          }
        </div>
      }
    </div>

    <!-- Sequence -->
    <div>
      <label class="font-semibold text-gray-700 mb-1 block text-sm">Sequence</label>
      <input
        type="number"
        [(ngModel)]="form.sequence"
        class="border border-gray-300 w-full rounded-lg px-3 py-2 h-10 focus:outline-none"
      />
    </div>
  </div>
</app-dialog>
