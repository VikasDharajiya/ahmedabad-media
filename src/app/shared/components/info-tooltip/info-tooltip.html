<div class="relative group inline-block">
  <!-- Trigger -->
  <ng-content></ng-content>

  <!-- Tooltip -->
  <div
    class="absolute z-50 whitespace-nowrap px-3 py-1.5 text-xs font-medium text-white bg-gray-800 rounded-md shadow-md opacity-0 group-hover:opacity-100 transition-all duration-200 scale-95 group-hover:scale-100"
    [ngClass]="{
      'left-full top-3/4 -translate-y-5/6 ml-5': position === 'right',
      'right-full top-1/2 -translate-y-1/2 mr-2': position === 'left',
      'bottom-full left-1/2 -translate-x-1/2 mb-2': position === 'top',
      'top-full left-1/2 -translate-x-1/2 mt-2': position === 'bottom',
    }"
  >
    {{ text }}

    <div
      class="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-full w-0 h-0 border-y-4 border-y-transparent border-r-4 border-r-gray-800"
    ></div>
  </div>
</div>
