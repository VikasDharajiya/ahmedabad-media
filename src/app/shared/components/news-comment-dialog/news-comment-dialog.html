<app-dialog [(visible)]="visible" title="Comments" [showFooter]="false" size="lg">
  <div class="overflow-y-auto max-h-[400px] border border-gray-400 rounded-lg m-4 lg:m-6">
    <table class="w-full text-sm">
      <thead class="bg-gray-100 text-left">
        <tr>
          <th class="p-3 w-16">No</th>
          <th class="p-3">Comment</th>
          <th class="p-3 w-40">Username</th>
        </tr>
      </thead>
      <tbody>
        @for (c of comments; track c.no) {
          <tr class="border-t border-gray-400 hover:bg-gray-50">
            <td class="p-3">{{ c.no }}</td>
            <td class="p-3">{{ c.comment }}</td>
            <td class="p-3">{{ c.username }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</app-dialog>
