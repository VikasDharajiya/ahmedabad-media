<div>
  @if (label) {
    <label class="font-semibold text-gray-700 mb-4 block">{{ label }}</label>
  }

  <!-- Toolbar -->
  <div
    class="border border-gray-300 rounded-t-lg px-2 py-1.5 bg-gray-50 flex items-center gap-0.5 flex-wrap"
  >
    <button
      type="button"
      (click)="fmt('bold')"
      title="Bold"
      class="p-1.5 rounded hover:bg-gray-200 transition font-bold text-gray-700 text-sm w-7 h-7 flex items-center justify-center"
    >
      B
    </button>

    <button
      type="button"
      (click)="fmt('italic')"
      title="Italic"
      class="p-1.5 rounded hover:bg-gray-200 transition italic text-gray-700 text-sm w-7 h-7 flex items-center justify-center"
    >
      I
    </button>

    <button
      type="button"
      (click)="insertLink()"
      title="Link"
      class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
    >
      <svg
        class="w-3.5 h-3.5"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
        <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
      </svg>
    </button>

    <button
      type="button"
      (click)="fmt('formatBlock', 'blockquote')"
      title="Quote"
      class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 text-sm w-7 h-7 flex items-center justify-center"
    >
      ❝
    </button>

    <button
      type="button"
      (click)="fmt('formatBlock', 'pre')"
      title="Code"
      class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 font-mono text-xs w-7 h-7 flex items-center justify-center"
    >
      &lt;/&gt;
    </button>

    <button
      type="button"
      (click)="insertImage()"
      title="Image"
      class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
    >
      <svg
        class="w-3.5 h-3.5"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
    </button>

    <div class="w-px h-5 bg-gray-200 mx-1"></div>

    <button
      type="button"
      (click)="fmt('insertUnorderedList')"
      title="Bullet list"
      class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
    >
      <svg
        class="w-3.5 h-3.5"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <line x1="9" y1="6" x2="20" y2="6" />
        <line x1="9" y1="12" x2="20" y2="12" />
        <line x1="9" y1="18" x2="20" y2="18" />
        <circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none" />
        <circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none" />
        <circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none" />
      </svg>
    </button>

    <button
      type="button"
      (click)="fmt('insertOrderedList')"
      title="Numbered list"
      class="p-1.5 rounded hover:bg-gray-200 transition text-gray-700 w-7 h-7 flex items-center justify-center"
    >
      <svg
        class="w-3.5 h-3.5"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <line x1="10" y1="6" x2="21" y2="6" />
        <line x1="10" y1="12" x2="21" y2="12" />
        <line x1="10" y1="18" x2="21" y2="18" />
        <path d="M4 6h1v4" />
        <path d="M4 10H6" />
        <path d="M6 18H4l2-2.5a1 1 0 00-1.8-.6" />
      </svg>
    </button>
  </div>

  <!-- Editable Area -->
  <div
    #editor
    contenteditable="true"
    [class]="
      'border border-gray-300 border-t-0 rounded-b-lg px-4 py-3 text-sm text-gray-600 focus:outline focus:outline-gray-300 ' +
      minHeightClass
    "
    [attr.placeholder]="placeholder"
    (input)="onInput()"
  ></div>
</div>
