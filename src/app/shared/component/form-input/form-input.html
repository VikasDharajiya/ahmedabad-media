<div [formGroup]="form">
  <label class="text-sm font-semibold text-gray-700 mb-1 block">
    {{ label }}
    @if (required) {
      <span class="text-red-600">*</span>
    }
  </label>

  <input [type]="type" [formControlName]="controlName" class="form-select text-gray-600" />

  @if (form.get(controlName)?.touched && form.get(controlName)?.invalid) {
    <p class="text-red-600 text-xs p-1">{{ label }} is required</p>
  }
</div>
