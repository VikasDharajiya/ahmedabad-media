<p-iconfield class="relative w-full lg:w-64">
  <p-inputicon
    class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
  ></p-inputicon>

  <input
    type="text"
    pInputText
    [placeholder]="placeholder"
    [ngModel]="model"
    (ngModelChange)="modelChange.emit($event)"
    class="search-input w-full"
  />
</p-iconfield>
