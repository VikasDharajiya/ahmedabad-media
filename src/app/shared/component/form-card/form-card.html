<div [class]="'bg-white shadow-lg rounded-lg p-8 w-full ' + maxWidthClass">
  <ng-content />

  <div class="flex gap-3 mt-6">
    <app-button
      variant="primary-btn"
      [label]="saveLabel"
      type="submit"
      styleClass=" py-3 px-6 text-sm font-medium"
    >
    </app-button>
    <app-button
      [routerLink]="cancelRoute"
      variant="secondary-btn"
      label="Cancel"
      type="button"
      styleClass=""
    >
    </app-button>
  </div>
</div>
