<div class="filter-bar">
  <!-- Left: always takes only as much space as it needs -->
  <div class="filter-left">
    @if (filters.length > 0) {
      <button
        (click)="toggleFilters()"
        class="filter-toggle-btn shrink-0 bg-[url('/assets/images/tabler-icon-filter.png')] bg-no-repeat bg-center bg-size-[20px]"
        [class.active]="filtersOpen"
      ></button>
    }

    <div class="filters-panel" [class.open]="filtersOpen">
      @for (filter of filters; track filter.key) {
        @if (!filter.type || filter.type === 'select') {
          <div class="min-w-24 w-full md:w-auto">
            <select
              [(ngModel)]="selectedFilters[filter.key]"
              (change)="onFilterChange()"
              class="filters w-full bg-[url('/assets/images/tabler-icon-triangle-inverted.png')] bg-no-repeat bg-position-[right_6px_center] bg-size-[9px]"
            >
              <option value="">{{ filter.label }}</option>
              @for (option of filter.options; track option) {
                <option [value]="option">{{ option }}</option>
              }
            </select>
          </div>
        }

        @if (filter.type === 'date-range') {
          <div class="date-range-group">
            <input
              #fromInput
              type="date"
              [(ngModel)]="dateFrom"
              (click)="fromInput.showPicker()"
              (change)="onFilterChange()"
              class="filters pr-2 cursor-pointer flex-1"
            />
            <span class="text-gray-400 text-sm shrink-0">—</span>
            <input
              #toInput
              type="date"
              [(ngModel)]="dateTo"
              (click)="toInput.showPicker()"
              (change)="onFilterChange()"
              class="filters pr-2 cursor-pointer flex-1"
            />
          </div>
        }
      }

      @if (filters.length > 0) {
        <button (click)="onReset()" class="reset-btn">
          <img class="w-4" src="assets/images/tabler-icon-rotate.png" alt="reset" />
          Reset
        </button>
      }
    </div>
  </div>

  <!-- Right: search -->
  <div [class]="filters.length > 0 ? 'filter-right' : 'filter-right-full'">
    <app-icon-field
      [placeholder]="searchPlaceholder"
      [(model)]="searchText"
      (modelChange)="onFilterChange()"
    ></app-icon-field>
  </div>
</div>
