<aside
  class="w-52 min-h-screen bg-white border-r border-gray-200 flex flex-col fixed top-0 left-0 z-20"
>
  <!-- Logo -->
  <div class="flex items-center justify-center py-6 border-gray-100">
    <img src="assets/images/logo.png" alt="logo" />
  </div>

  <!-- Nav -->
  <nav class="flex-1 py-4 px-3 gap-2 flex flex-col">
    <!--  Menu -->
    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.route"
      routerLinkActive="bg-red-700 text-white"
      class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-700 text-sm font-semibold transition-all duration-300 ease-in-out"
    >
      <img
        [src]="item.icon"
        class="w-6 filter transition duration-300 ease-in-out group-hover:brightness-125"
        routerLinkActive="filter-white"
      />

      {{ item.label }}
    </a>

    <!-- Logout -->
    <div class="flex mt-5 flex-col">
      <div class="border-t border-gray-200 mb-5"></div>

      <a
        [routerLink]="['/']"
        class="flex items-center gap-3 px-3 py-2.5 text-gray-700 text-sm font-semibold transition-all duration-300 ease-in-out"
      >
        <img src="assets/images/logout-icon.png" />
        Logout
      </a>
    </div>
  </nav>
</aside>
