<div class="min-h-screen bg-gray-100">
  <!-- Sidebar -->
  <app-sidebar [collapsed]="isSidebarCollapsed" (toggle)="toggleSidebar()"></app-sidebar>

  <!-- Main Content -->
  <main
    class="flex-1 transition-all duration-300 p-2 sm:p-4 md:p-6 lg:p-8"
    [ngClass]="isSidebarCollapsed ? 'ml-16' : 'ml-32 sm:ml-44 md:ml-56'"
  >
    <router-outlet></router-outlet>
  </main>
</div>
